<!DOCTYPE html>
<html>
    <head>
        <title>Salon Smart Queue</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header class="main-header">
            <div class="logo-container">
                <img src="logo.png" alt="Glamour Salon Logo" class="logo" >
                <div class="header-text">

        <nav>
            <a href="book.jsp">Book Appointment</a>
            <a href="AdminDashboardServlet.do">Admin</a>
        </nav>

        
        <main class="container">

                <img src="straight_back.png" alt="Straight Back" />

                <img src="goddess.png" alt="Goddess" />
                <img src="mid_with_egdes.png" alt="Mid with Edges" />
                <img src="middle_part.png" alt="Middle Part" />
                <img src="sidepart.png" alt="Side Part" />
                <img src="chiskop.png" alt="Chiskop" />
                <img src="cut.png" alt="Cut" />
                <img src="brush.png" alt="Brush" />
                <img src="white.png" alt="White dye" />
                <img src="copper.png" alt="Copper dye" />
                <img src="black.png" alt="Black dye" />

        <footer>
            © 2026 Glamour Salon | Beauty by Lutricia
